<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estudiantes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f9fafb;
            color: #111827;
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
        }

        .page { max-width: 860px; margin: 0 auto; }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.75rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; color: #111827; }

        .btn {
            display: inline-block;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: background 0.15s;
        }
        .btn-primary { background: #111827; color: #fff; }
        .btn-primary:hover { background: #374151; }
        .btn-ghost {
            background: transparent;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .btn-ghost:hover { background: #f3f4f6; color: #111827; }
        .btn-danger {
            background: transparent;
            color: #dc2626;
            border: 1px solid #fecaca;
            font-size: 0.8rem;
            padding: 0.3rem 0.7rem;
        }
        .btn-danger:hover { background: #fef2f2; }
        .btn-edit {
            background: transparent;
            color: #2563eb;
            border: 1px solid #bfdbfe;
            font-size: 0.8rem;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.15s;
        }
        .btn-edit:hover { background: #eff6ff; }

        .toolbar {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .search-input {
            padding: 0.45rem 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 0.875rem;
            font-family: inherit;
            background: #fff;
            color: #111827;
            outline: none;
            width: 220px;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: #6b7280; }

        .search-wrap { position: relative; display: inline-flex; align-items: center; }
        .btn-clear {
            position: absolute;
            right: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 1rem;
            line-height: 1;
            padding: 0;
            display: none;
        }
        .btn-clear:hover { color: #374151; }
        .search-wrap:has(input:not([value=''])) .btn-clear { display: block; }
        .search-wrap input { padding-right: 1.75rem; }

        .toast {
            padding: 0.65rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
        }
        .toast-ok  { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .toast-err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: #f9fafb; border-bottom: 1px solid #e5e7eb; }

        th {
            padding: 0.7rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
        }

        td {
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: #374151;
            border-top: 1px solid #f3f4f6;
        }

        tr:hover td { background: #fafafa; }

        .actions { display: flex; gap: 0.4rem; align-items: center; }
        .empty { text-align: center; color: #9ca3af; padding: 2.5rem 0; font-size: 0.875rem; }
        form.inline { display: inline; }
    </style>
</head>
<body>
<div class="page">

    <div class="page-header">
        <h1>Estudiantes</h1>
        <a th:href="@{/estudiantes/nuevo}" class="btn btn-primary">+ Nuevo</a>
    </div>

    <p class="toast toast-ok" th:if="${mensaje}" th:text="${mensaje}"></p>
    <p class="toast toast-err" th:if="${error}" th:text="${error}"></p>

    <div class="toolbar">
        <form method="get" th:action="@{/estudiantes}" style="display:flex;gap:0.6rem">
            <div class="search-wrap">
                <input class="search-input" type="text" name="q" placeholder="Buscar por nombre…"
                       th:value="${q}" id="searchInput">
                <button type="button" class="btn-clear" title="Limpiar"
                        onclick="document.getElementById('searchInput').value=''; this.closest('form').submit();">&#x2715;</button>
            </div>
            <button class="btn btn-ghost" type="submit">Buscar</button>
        </form>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Fecha registro</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(estudiantes)}">
                <td colspan="5" class="empty">Sin registros todavía.</td>
            </tr>
            <tr th:each="estudiante : ${estudiantes}">
                <td th:text="${estudiante.id}"></td>
                <td th:text="${estudiante.nombre}"></td>
                <td th:text="${estudiante.correo}"></td>
                <td th:text="${estudiante.fechaRegistro}"></td>
                <td>
                    <div class="actions">
                        <a class="btn-edit" th:href="@{/estudiantes/editar/{id}(id=${estudiante.id})}">Editar</a>
                        <form class="inline" th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" method="post">
                            <button class="btn btn-danger" type="submit"
                                    onclick="return confirm('¿Eliminar este estudiante?')">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
